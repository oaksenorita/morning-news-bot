name: Daily News Bot

on:
  schedule:
    # 毎日 日本時間 朝7:00 に実行 (UTC 22:00)
    - cron: '0 22 * * *'
  workflow_dispatch: # 手動実行ボタンも有効にする

jobs:
  run-news-bot:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリのコードを取得
        uses: actions/checkout@v3

      - name: Pythonをセットアップ
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'  # ←ここを3.9から3.11にするだけ！

      - name: ライブラリをインストール
        run: pip install -r requirements.txt

      - name: ニュースボットを実行
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LINE_ACCESS_TOKEN: ${{ secrets.LINE_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}  # ←この行を追加！
        run: python main.py
