name: Daily News Bot

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  run-news-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      # ★バージョンを v3 -> v4 に変更（警告対策）
      - name: リポジトリのコードを取得
        uses: actions/checkout@v4

      # ★バージョンを v4 -> v5 に変更（警告対策）
      - name: Pythonをセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: ライブラリをインストール
        run: pip install -r requirements.txt

      - name: ニュース生成とHTML保存
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LINE_ACCESS_TOKEN: ${{ secrets.LINE_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
        run: python main.py

     # ★エラーで止まらないように少し安全に書き換え
      - name: 生成したWebページを保存して公開
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/.nojekyll || echo "No file to add"
          git commit -m "Update daily news HTML" || echo "No changes to commit"
          git push || echo "Push failed or nothing to push"
